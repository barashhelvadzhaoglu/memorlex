name: Weekly Level-Based Story & Video Generator

on:
  schedule:
    - cron: '0 3 * * *' # Her gün TR saatiyle 06:00
  workflow_dispatch: # Manuel çalıştırma butonu

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick fonts-liberation ffmpeg
          # ImageMagick policy güncellemesi (Metin yazabilmek için şart)
          sudo sed -i 's/domain="path" rights="none" pattern="@\*"/domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests Pillow gTTS "moviepy>=2.0.0" google-generativeai python-dotenv

      - name: Step 1 - Generate Story
        id: gen_story
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Scripti çalıştır ve log al
          python scripts/generate_story.py > story_log.txt 2>&1
          cat story_log.txt
          
          # Başarılı üretilen dosyanın yolunu logdan çek
          STORY_PATH=$(grep "✅ BAŞARILI:" story_log.txt | awk -F': ' '{print $2}' | xargs)
          
          if [ -z "$STORY_PATH" ]; then
            echo "🚨 JSON oluşturulamadı, workflow durduruluyor."
            exit 1
          fi
          
          echo "STORY_FILE=$STORY_PATH" >> $GITHUB_ENV
          echo "Oluşturulan dosya: $STORY_PATH"

      - name: Step 2 - Create Video
        if: env.STORY_FILE != ''
        run: |
          echo "🎥 Video üretimi başlıyor: ${{ env.STORY_FILE }}"
          python scripts/create_storybook.py "${{ env.STORY_FILE }}"

      - name: Step 3 - Upload Video Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: story-video
          path: "*.mp4" # Script root dizine kaydettiği için
          retention-days: 5

      - name: Step 4 - Commit and Push
        if: success() && env.STORY_FILE != ''
        run: |
          git config --global user.name 'Memorlex Bot'
          git config --global user.email 'bot@memorlex.com'
          git add src/data/stories/de/
          git commit -m "🚀 Auto-Generated Story & Video: ${{ env.STORY_FILE }}" || echo "Değişiklik yok"
          git push